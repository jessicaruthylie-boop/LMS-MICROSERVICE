services:
  mongodb:
    image: mongo
    ports:
      - "27018:27017"

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"

  course-service:
    build: ./course-service
    ports:
      - "3002:3002"
    depends_on:
      - mongodb

  enrollment-service:
    build: ./enrollment-service
    ports:
      - "3003:3003"
    depends_on:
      - mysql

  quiz-service:
    build: ./quiz-service
    ports:
      - "3005:3005"
    depends_on:
      - mysql

  exam-service:
    build: ./exam-service
    ports:
      - "3004:3004"
    depends_on:
      - postgres
      - rabbitmq

  notification-service:
    build: ./notification-service
    ports:
      - "3007:3007"
    depends_on:
      - rabbitmq

  postgres:
    image: postgres
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
